<!-- Dappled Light HTML Structure -->
<!-- Place this at the beginning of your body element -->
<div class="dappled-layer" aria-hidden="true">
  <div class="dappled-layer__wash"></div>
  <div class="dappled-layer__shadows" id="dappled-shadows"></div>
  <div class="dappled-layer__bokeh" id="dappled-bokeh"></div>
  <div class="dappled-layer__grain"></div>
</div>

<!-- Usage Example:
<body data-style="default" data-dappled="on">
  <div class="dappled-layer" aria-hidden="true">
    <div class="dappled-layer__wash"></div>
    <div class="dappled-layer__shadows" id="dappled-shadows"></div>
    <div class="dappled-layer__bokeh" id="dappled-bokeh"></div>
    <div class="dappled-layer__grain"></div>
  </div>
  <!-- Your content here -->
</body>
-->

<!-- Enable/Disable Control:
- data-dappled="on"  : Enable dappled light effect
- data-dappled="off" : Disable dappled light effect
-->

<!-- Theme Options (set via data-style attribute):
- default : Tree canopy light and shadow
- warm    : Warm light rays through canopy
- sky     : French window cross projection
- night   : Moonlight scattering
- spring  : Scattered light spots + fine shadows
-->
